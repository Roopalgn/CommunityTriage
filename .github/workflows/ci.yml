name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax check
        run: npm run check:syntax

      - name: Run unit and integration tests
        run: npm test

      - name: Run offline evaluation baseline
        run: npm run evaluate:offline
